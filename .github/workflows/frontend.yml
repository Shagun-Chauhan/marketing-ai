name: Frontend CI

on:
  push:
    paths:
      - 'Frontend/**'

jobs:

  build:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Frontend

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: npm run build

      - run: docker build -t frontend-test .